<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="/css/app.css">
</head>

<body>

    <div class="container">

        <h1 class="mb-4">Registro</h1>

        <form id="form-register">

            <div class="mb-3">
                <label>Nombre</label>
                <input id="nombre" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input id="email" type="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input id="password" type="password" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Confirmar password</label>
                <input id="password2" type="password" class="form-control" required>
            </div>

            <button class="btn btn-primary">
                Registrarse
            </button>

            <div
                id="error"
                class="text-danger mt-3"
                style="display:none"
            >
                Error en el registro
            </div>

            <div
                id="success"
                class="text-success mt-3"
                style="display:none"
            >
                Usuario registrado correctamente
            </div>

        </form>

        <div class="mt-3">
            <a href="/login.html">¿Ya tienes cuenta? Login</a>
        </div>

    </div>

    <script type="module" src="/js/auth/register.js"></script>

</body>
</html>

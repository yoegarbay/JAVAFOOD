<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Nueva película</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="/css/app.css">

</head>

<body>

    <div class="container">

        <h1>Nueva película</h1>

        <form id="form-pelicula">

            <div class="mb-3">
                <label class="form-label">Título</label>
                <input id="titulo" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Año</label>
                <input id="anyo" type="number" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Duración</label>
                <input id="duracion" type="number" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Director</label>
                <select id="director" class="form-select"></select>
            </div>

            <div class="mb-3">
                <label class="form-label">Sinopsis</label>
                <textarea id="sinopsis" class="form-control"></textarea>
            </div>

            <button class="btn btn-primary">
                Guardar
            </button>

            <a href="index.html" class="btn btn-secondary">
                Cancelar
            </a>

        </form>

    </div>

    <script type="module" src="/js/admin/peliculas/create.js"></script>

</body>

</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaFood - Iniciar Sesión</title>
    <link rel="stylesheet" href="JAVAFOOD.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="code-overlay"></div>

    <div
      class="kiosk-container"
      style="justify-content: center; align-items: center"
    >
      <div class="sidebar" style="width: 400px; margin: auto">
        <div class="logo-area">
          <h1>Java<span>Food</span></h1>
          <p>Iniciar Sesión</p>
        </div>

        <form class="form" onsubmit="iniciarSesion(event)">
          <input
            id="loginEmail"
            type="email"
            placeholder="Correo Electrónico"
            required
          />
          <input
            id="loginPassword"
            type="password"
            placeholder="Contraseña"
            required
          />

          <button type="submit" class="pay-btn">Entrar</button>
        </form>

        <p style="margin-top: 15px; text-align: center">
          ¿No tienes cuenta?
          <a href="Registrarse.html" class="link">Regístrate aquí</a>
        </p>

        <p id="mensaje" class="message"></p>
      </div>
    </div>

    <script src="jsInicioRegistro.js"></script>
  </body>
</html>

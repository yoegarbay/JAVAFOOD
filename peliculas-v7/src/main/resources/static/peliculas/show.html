<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Detalle de película</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="/css/app.css">
</head>

<body>

    <div class="container">

        <h1 id="titulo"></h1>

        <div class="mb-3">
            <strong>Año:</strong>
            <span id="anyo"></span>
        </div>

        <div class="mb-3">
            <strong>Duración:</strong>
            <span id="duracion"></span>
            min
        </div>

        <div class="mb-3">
            <strong>Director:</strong>
            <span id="director"></span>
        </div>

        <div class="mb-4">
            <strong>Sinopsis:</strong>
            <p id="sinopsis" class="mt-2"></p>
        </div>

        <hr>

        <section class="mb-4">
            <h2>Valoración</h2>

            <p class="mb-1">
                <strong>Media:</strong>
                <span id="rating-media"></span>
            </p>

            <p>
                <strong>Número de votos:</strong>
                <span id="rating-total"></span>
            </p>
        </section>

		<section id="seccion-voto" class="mb-4"></section>
		
		<hr>

        <section class="mb-4">
            <h2>Últimas críticas</h2>

            <div id="ultimos-votos"></div>

            <a id="enlace-votos" href="#" class="btn btn-outline-primary mt-3">
                Ver todos los votos
            </a>
        </section>

        <a href="index.html" class="btn btn-secondary">
            Volver
        </a>

    </div>

    <script type="module" src="/js/peliculas/show.js"></script>

</body>

</html>
